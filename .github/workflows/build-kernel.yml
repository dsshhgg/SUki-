name: Test Build Raphael Kernel

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
    - name: Install deps
      run: sudo apt-get update -qq && sudo apt-get install -y -qq flex bison bc libssl-dev gcc-aarch64-linux-gnu git

    - name: Clone source
      run: |
        git clone --depth=1 --single-branch --branch raphael-p-oss \
          https://github.com/raphael-ubports/kernel_xiaomi_raphael_stock kernel
        cd kernel
        fold -s Makefile | head -20
        ls arch/arm64/configs/raphael_user_defconfig
        echo "CLONE OK"

    - name: Build kernel (minimal test)
      run: |
        cd $GITHUB_WORKSPACE/kernel
        export ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu-
        make O=out raphael_user_defconfig
        make O=out -j$(nproc) 2>&1 | tee out/build.log | tail -50
        echo "===== BUILD COMPLETE ====="
        echo "Checking output files..."
        find out/ -maxdepth 5 -name "Image*" -type f 2>/dev/null || echo "No Image* found"
        find out/ -maxdepth 5 -name "vmlinux*" -type f 2>/dev/null || echo "No vmlinux* found"
        ls -la out/ 2>/dev/null || echo "out dir empty"
        echo "===== LOG ERRORS ====="
        grep -i "error" out/build.log | head -20 || echo "No errors found"
