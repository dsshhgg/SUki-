name: Build SukiSU-Ultra Kernel for Raphael

on:
  workflow_dispatch:
  push:
    branches: [main]

env:
  ARCH: arm64
  CC: clang
  CROSS_COMPILE: aarch64-linux-gnu-
  CROSS_COMPILE_COMPAT: arm-linux-gnueabihf-
  CLANG_TRIPLE: aarch64-linux-gnu-

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
    - name: Install deps
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq flex bison bc libssl-dev \
          clang lld gcc-aarch64-linux-gnu gcc-arm-linux-gnueabihf git curl python3

    - name: Clone kernel source
      run: |
        git clone --depth=1 --single-branch --branch main \
          https://github.com/Nevers1/kernel_xiaomi_raphael kernel
        echo "Kernel version:"
        head -5 kernel/Makefile

    - name: Fix compatibility
      run: |
        cd $GITHUB_WORKSPACE/kernel
        # Fix yylloc (GCC/Clang strict build)
        for f in scripts/dtc/dtc-lexer.lex.c_shipped scripts/dtc/dtc-lexer.l; do
          [ -f "$f" ] && sed -i 's/^YYLTYPE yylloc;/extern YYLTYPE yylloc;/' "$f"
        done
        echo "Toolchain:"
        clang --version | head -1
        aarch64-linux-gnu-as --version | head -1

    - name: Upgrade to SukiSU-Ultra v4.1.3
      run: |
        cd $GITHUB_WORKSPACE/kernel
        # Remove old KSU symlink and submodule
        rm -rf drivers/kernelsu KernelSU-Next
        git checkout -- drivers/Makefile drivers/Kconfig 2>/dev/null || true
        # Download latest setup.sh
        curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" -o setup.sh
        # Install SukiSU-Ultra v4.1.3
        bash setup.sh v4.1.3 || { echo "SETUP FAILED"; exit 1; }
        echo "KSU driver check:"
        ls -la drivers/kernelsu/Makefile
        echo "=== KSU version ==="
        cat drivers/kernelsu/core/ksu_version.h 2>/dev/null || true

    - name: Configure kernel
      run: |
        cd $GITHUB_WORKSPACE/kernel
        make O=out raphael_defconfig
        cd out
        # Ensure KSU config is enabled
        sed -i 's/.*CONFIG_KSU.*/CONFIG_KSU=y/' .config 2>/dev/null || \
          echo "CONFIG_KSU=y" >> .config
        grep -q "CONFIG_KSU_MANUAL_HOOK" .config || \
          echo "CONFIG_KSU_MANUAL_HOOK=y" >> .config
        grep -q "CONFIG_KALLSYMS_ALL" .config || \
          echo "CONFIG_KALLSYMS_ALL=y" >> .config
        make olddefconfig
        echo "=== KSU config ==="
        grep -i "ksu\|kallsyms" .config

    - name: Build kernel
      run: |
        cd $GITHUB_WORKSPACE/kernel
        make O=out Image -j$(nproc) 2>&1 | tee out/build.log
        echo "===== RESULT ====="
        if [ -f out/arch/arm64/boot/Image ]; then
          echo "BUILD SUCCESS"
          ls -la out/arch/arm64/boot/Image*
        else
          echo "BUILD FAILED"
          echo "--- Errors ---"
          grep -i "error:" out/build.log | tail -30 || true
          echo "--- Last 50 lines ---"
          tail -50 out/build.log
          exit 1
        fi

    - name: Upload build log
      if: always()
      run: |
        [ -f kernel/out/build.log ] && cp kernel/out/build.log build.log

    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: build-log
        path: build.log
        retention-days: 3

    - name: Compress Image
      if: success()
      run: |
        cd $GITHUB_WORKSPACE
        cp kernel/out/arch/arm64/boot/Image Image
        gzip -f -9 Image
        ls -la Image.gz

    - uses: actions/upload-artifact@v4
      if: success()
      with:
        name: SukiSU-Ultra-v4.1.3-Image-raphael
        path: Image.gz
        retention-days: 7
