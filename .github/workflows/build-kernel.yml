name: Build ReSukiSU Kernel for Raphael

on:
  workflow_dispatch:
  push:
    branches: [main]

env:
  ARCH: arm64
  CC: clang
  CROSS_COMPILE: aarch64-linux-gnu-
  CROSS_COMPILE_COMPAT: arm-linux-gnueabihf-
  CLANG_TRIPLE: aarch64-linux-gnu-

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
    - uses: actions/checkout@v4

    - name: Install deps
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq flex bison bc libssl-dev \
          clang lld gcc-aarch64-linux-gnu gcc-arm-linux-gnueabihf git curl python3

    - name: Clone kernel source
      run: |
        git clone --depth=1 --single-branch --branch master \
          https://github.com/zclkkk/kernel_xiaomi_sm8150 kernel
        echo "Kernel version:"
        head -5 kernel/Makefile

    - name: Copy device config
      run: |
        cp $GITHUB_WORKSPACE/device_config kernel/arch/arm64/configs/device_config
        echo "[+] Device config copied"

    - name: Fix compatibility
      run: |
        cd $GITHUB_WORKSPACE/kernel
        for f in scripts/dtc/dtc-lexer.lex.c_shipped scripts/dtc/dtc-lexer.l; do
          [ -f "$f" ] && sed -i 's/^YYLTYPE yylloc;/extern YYLTYPE yylloc;/' "$f"
        done
        sed -i 's|^REAL_CC|#REAL_CC|' Makefile
        sed -i 's|^CC.*scripts/gcc-wrapper.py|CC = clang|' Makefile
        grep -q '^PERL' Makefile && sed -i 's|^PERL.*|PERL = perl|' Makefile
        sed -i '/^KBUILD_CFLAGS.*Werror=date-time/a KBUILD_CFLAGS += -Wno-error=unused-but-set-variable' Makefile
        sed -i 's/LDFLAGS_vmlinux\s*:=.*/LDFLAGS_vmlinux := --no-undefined -X/' arch/arm64/Makefile
        sed -i 's/-pie -shared/-pie --no-dynamic-linker/' arch/arm64/Makefile
        sed -i 's/LDFLAGS_vmlinux\s*:=.*/& --noinhibit-exec/' arch/arm64/Makefile
        echo "[+] Compatibility fixes applied"

    - name: Integrate ReSukiSU
      run: |
        cd $GITHUB_WORKSPACE/kernel
        git clone --depth=1 https://github.com/ReSukiSU/ReSukiSU KernelSU
        echo "[+] ReSukiSU cloned"

        if [ -d "common/drivers" ]; then
          DRIVER_DIR="common/drivers"
        else
          DRIVER_DIR="drivers"
        fi
        ln -sf "$(realpath --relative-to="$DRIVER_DIR" "$(pwd)/KernelSU/kernel")" "$DRIVER_DIR/kernelsu"

        grep -q "kernelsu" "$DRIVER_DIR/Makefile" || \
          printf "\nobj-\$(CONFIG_KSU) += kernelsu/\n" >> "$DRIVER_DIR/Makefile"

        grep -q "kernelsu" "$DRIVER_DIR/Kconfig" || \
          sed -i '/^endmenu/i\source "drivers/kernelsu/Kconfig"' "$DRIVER_DIR/Kconfig"

        sed -i 's|MODULE_IMPORT_NS|//MODULE_IMPORT_NS|g' "$DRIVER_DIR/kernelsu/ksu.c" 2>/dev/null || true
        sed -i '1s/^/#define fallthrough do {} while (0)\n/' "$DRIVER_DIR/kernelsu/allowlist.c" 2>/dev/null || true
        sed -i 's/current_sid/ksu_current_sid/g' "$DRIVER_DIR/kernelsu/feature/selinux_hide.c" 2>/dev/null || true
        sed -i 's/(selinux_disabled)/(!selinux_enabled)/g' "$DRIVER_DIR/kernelsu/selinux/selinux_defs.h" 2>/dev/null || true
        echo "[+] ReSukiSU integrated"

    - name: Apply manual hooks
      run: |
        cp $GITHUB_WORKSPACE/hooks.py $GITHUB_WORKSPACE/kernel/hooks.py
        cd $GITHUB_WORKSPACE/kernel && python3 hooks.py

    - name: Configure kernel
      run: |
        cd $GITHUB_WORKSPACE/kernel
        make O=out raphael_defconfig
        cd out
        # Merge device config
        ../scripts/kconfig/merge_config.sh .config ../arch/arm64/configs/device_config 2>/dev/null || \
          ../scripts/kconfig/merge_config.sh -m .config ../arch/arm64/configs/device_config
        # Add KSU configs
        sed -i 's/.*CONFIG_KSU.*/CONFIG_KSU=y/' .config 2>/dev/null || \
          echo "CONFIG_KSU=y" >> .config
        grep -q "CONFIG_KSU_MANUAL_HOOK" .config || \
          echo "CONFIG_KSU_MANUAL_HOOK=y" >> .config
        grep -q "CONFIG_OVERLAY_FS" .config || \
          echo "CONFIG_OVERLAY_FS=y" >> .config
        grep -q "CONFIG_KALLSYMS_ALL" .config || \
          echo "CONFIG_KALLSYMS_ALL=y" >> .config
        grep -q "CONFIG_KALLSYMS" .config || \
          echo "CONFIG_KALLSYMS=y" >> .config
        # Ensure DTB append is enabled for boot partition flash
        grep -q "CONFIG_BUILD_ARM64_APPENDED_DTB_IMAGE" .config || \
          echo "CONFIG_BUILD_ARM64_APPENDED_DTB_IMAGE=y" >> .config
        grep -q "CONFIG_IMG_GZ_DTB" .config || \
          echo "CONFIG_IMG_GZ_DTB=y" >> .config
        sed -i 's/.*CONFIG_BUILD_ARM64_UNCOMPRESSED_KERNEL.*/CONFIG_BUILD_ARM64_UNCOMPRESSED_KERNEL=y/' .config
        # Disable FORTIFY_SOURCE (breaks old drivers with new compilers)
        grep -q "CONFIG_FORTIFY_SOURCE" .config 2>/dev/null && \
          sed -i 's/.*CONFIG_FORTIFY_SOURCE.*/# CONFIG_FORTIFY_SOURCE is not set/' .config || \
          echo "# CONFIG_FORTIFY_SOURCE is not set" >> .config
        make olddefconfig
        echo "=== KSU config ==="
        grep -iE "ksu|kallsyms|overlay" .config
        echo "=== DTB config ==="
        grep -i "dtb" .config

    - name: Build kernel
      run: |
        cd $GITHUB_WORKSPACE/kernel
        set -o pipefail
        make O=out Image.gz-dtb -j$(nproc) \
          LD=ld.lld KCFLAGS="-Wno-error" 2>&1 | tee out/build.log
        echo "===== RESULT ====="
        if [ -f out/arch/arm64/boot/Image.gz-dtb ]; then
          echo "BUILD SUCCESS"
          ls -la out/arch/arm64/boot/Image*
        else
          echo "BUILD FAILED"
          echo "--- Errors ---"
          grep -i "error:" out/build.log | tail -30 || true
          echo "--- Last 50 lines ---"
          tail -50 out/build.log
          exit 1
        fi

    - name: Verify KSU symbols
      if: success()
      continue-on-error: true
      run: |
        cd $GITHUB_WORKSPACE/kernel
        IMAGE="out/arch/arm64/boot/Image.gz-dtb"
        if [ -f "$IMAGE" ]; then
          echo "File size: $(stat -c%s $IMAGE) bytes"
          echo "--- Searching for KSU strings ---"
          zcat "$IMAGE" 2>/dev/null | strings | grep -i "kernelsu\|ksu_\|CONFIG_KSU" | head -20 || \
            strings "$IMAGE" | grep -i "kernelsu\|ksu_\|CONFIG_KSU" | head -20 || echo "NO KSU SYMBOLS FOUND!"
          KSU_COUNT=$(zcat "$IMAGE" 2>/dev/null | strings | grep -ic "kernelsu\|ksu_" || strings "$IMAGE" | grep -ic "kernelsu\|ksu_" || true)
          echo "KSU-related strings found: $KSU_COUNT"
        else
          echo "Image.gz-dtb not found at $IMAGE"
        fi

    - name: Copy build log
      if: always()
      run: |
        [ -f kernel/out/build.log ] && cp kernel/out/build.log build.log

    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: build-log
        path: build.log
        retention-days: 3

    - name: Copy kernel image
      if: success()
      run: |
        cd $GITHUB_WORKSPACE
        cp kernel/out/arch/arm64/boot/Image.gz-dtb Image.gz-dtb
        ls -la Image.gz-dtb

    - uses: actions/upload-artifact@v4
      if: success()
      with:
        name: ReSukiSU-v4.1.3-Image-gz-dtb-raphael
        path: Image.gz-dtb
        retention-days: 7

    - name: Create AnyKernel3 flashable zip
      if: success()
      run: |
        cd $GITHUB_WORKSPACE
        git clone --depth=1 https://github.com/osm0sis/AnyKernel3 ak3
        cd ak3
        rm -rf .git README.md LICENSE *.md
        cp ../Image.gz-dtb Image.gz-dtb
        printf '# AnyKernel3 Ramdisk Mod\n# https://github.com/osm0sis/AnyKernel3\n\nproperties=' > anykernel.sh
        printf '{\n' >> anykernel.sh
        printf 'kernel.string=ReSukiSU for raphael (Redmi K20 Pro)\n' >> anykernel.sh
        printf 'do.devicecheck=1\n' >> anykernel.sh
        printf 'device.name1=raphael\n' >> anykernel.sh
        printf 'device.name2=raphaelin\n' >> anykernel.sh
        printf 'block=/dev/block/bootdevice/by-name/boot;\n' >> anykernel.sh
        printf 'is_slot_device=1;\n' >> anykernel.sh
        printf 'ramdisk_compression=auto;\n' >> anykernel.sh
        printf 'patch_vbmeta_device=auto;\n' >> anykernel.sh
        printf '}\n\n' >> anykernel.sh
        printf "boot_dev=/dev/block/bootdevice/by-name/boot;\n" >> anykernel.sh
        zip -r9 ../ReSukiSU-v4.1.3-raphael-flashable.zip . -x '*.git*'
        echo "Flashable zip created:"
        ls -la ../ReSukiSU-v4.1.3-raphael-flashable.zip

    - uses: actions/upload-artifact@v4
      if: success()
      with:
        name: ReSukiSU-v4.1.3-raphael-flashable
        path: ReSukiSU-v4.1.3-raphael-flashable.zip
        retention-days: 7
