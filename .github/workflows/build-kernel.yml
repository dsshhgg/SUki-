name: Build SukiSU-Ultra Kernel for Raphael

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
    - name: Install deps
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq flex bison bc libssl-dev gcc-aarch64-linux-gnu git curl python3

    - name: Clone kernel source
      run: |
        git clone --depth=1 --single-branch --branch raphael-p-oss \
          https://github.com/raphael-ubports/kernel_xiaomi_raphael_stock kernel

    - name: Fix compatibility issues
      run: |
        cd $GITHUB_WORKSPACE/kernel
        # Fix ALL Python 2 -> Python 3 issues in gcc-wrapper.py
        sed -i 's/print \(.*\),$/print(\1, end=" ")/g' scripts/gcc-wrapper.py
        sed -i 's/^\( *\)print \("[^"]*"\), \(.*\)$/\1print(\2, \3)/g' scripts/gcc-wrapper.py
        sed -i 's/^\( *\)print \("[^"]*"\)$/\1print(\2)/g' scripts/gcc-wrapper.py
        # Also fix the shebang
        sed -i '1s|#!/usr/bin/env python|#!/usr/bin/env python3|' scripts/gcc-wrapper.py
        echo "=== Fixed gcc-wrapper.py lines 50-85 ==="
        sed -n '50,85p' scripts/gcc-wrapper.py

        # Fix yylloc multiple definition (GCC 12 vs old kernel)
        for f in scripts/dtc/dtc-lexer.lex.c_shipped scripts/dtc/dtc-lexer.l; do
          [ -f "$f" ] && sed -i 's/^YYLTYPE yylloc;/extern YYLTYPE yylloc;/' "$f"
        done

    - name: Integrate SukiSU-Ultra
      run: |
        cd $GITHUB_WORKSPACE/kernel
        curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" -o setup.sh
        bash setup.sh builtin || { echo "FAIL"; exit 1; }
        [ -L drivers/kernelsu ] && echo "OK: symlink" || { echo "MISSING"; exit 1; }

    - name: Configure kernel
      run: |
        cd $GITHUB_WORKSPACE/kernel
        export ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu-
        make O=out raphael_user_defconfig
        cd out
        {
          echo "CONFIG_KSU=y"
          echo "CONFIG_KSU_MANUAL_HOOK=y"
          echo "CONFIG_KALLSYMS=y"
          echo "CONFIG_KALLSYMS_ALL=y"
          echo "# CONFIG_CC_STACKPROTECTOR_STRONG is not set"
          echo "CONFIG_CC_STACKPROTECTOR_NONE=y"
        } >> .config
        make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- olddefconfig

    - name: Build kernel
      run: |
        cd $GITHUB_WORKSPACE/kernel
        export ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu-
        make O=out -j$(nproc) 2>&1 | tee out/build.log | tail -60
        echo "===== RESULT ====="
        if [ -f out/arch/arm64/boot/Image ]; then
          echo "BUILD SUCCESS"
          ls -la out/arch/arm64/boot/Image*
        else
          echo "BUILD FAILED"
          grep -i "error" out/build.log | tail -20 || true
          exit 1
        fi

    - name: Upload Image.gz
      run: |
        cd $GITHUB_WORKSPACE
        cp kernel/out/arch/arm64/boot/Image Image
        gzip -f -9 Image
        ls -la Image.gz

    - uses: actions/upload-artifact@v4
      with:
        name: SukiSU-Ultra-Image-raphael
        path: Image.gz
        retention-days: 7
