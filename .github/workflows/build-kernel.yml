name: Build SukiSU-Ultra Kernel for Raphael

on:
  workflow_dispatch:
  push:
    branches: [main]

env:
  ARCH: arm64
  CC: clang
  CROSS_COMPILE: aarch64-linux-gnu-
  CROSS_COMPILE_COMPAT: arm-linux-gnueabihf-
  CLANG_TRIPLE: aarch64-linux-gnu-

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
    - name: Install deps
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq flex bison bc libssl-dev \
          clang lld gcc-aarch64-linux-gnu gcc-arm-linux-gnueabihf git curl python3

    - name: Clone kernel source
      run: |
        git clone --depth=1 --single-branch --branch A14 \
          https://github.com/zclkkk/kernel_xiaomi_sm8150 kernel
        echo "Kernel version:"
        head -5 kernel/Makefile

    - name: Fix compatibility
      run: |
        cd $GITHUB_WORKSPACE/kernel
        for f in scripts/dtc/dtc-lexer.lex.c_shipped scripts/dtc/dtc-lexer.l; do
          [ -f "$f" ] && sed -i 's/^YYLTYPE yylloc;/extern YYLTYPE yylloc;/' "$f"
        done
        # Force Clang
        if grep -q 'scripts/gcc-wrapper.py' Makefile 2>/dev/null; then
          sed -i 's|^REAL_CC|#REAL_CC|' Makefile
          sed -i 's|^CC.*=.*scripts/gcc-wrapper.py|CC = clang|' Makefile
        fi
        if grep -q '^CC.*=.*gcc' Makefile 2>/dev/null; then
          sed -i 's|^CC.*=.*gcc|CC = clang|' Makefile
        fi
        grep "^CC" Makefile | head -3 || true

    - name: Integrate KSU Next (better 4.14 support)
      run: |
        cd $GITHUB_WORKSPACE/kernel
        git clone --depth=1 --single-branch --branch main \
          https://github.com/KernelSU-Next/KernelSU-Next KernelSU-Next
        cd drivers
        ln -sf ../KernelSU-Next/kernel kernelsu
        printf "\nobj-\$(CONFIG_KSU) += kernelsu/\n" >> Makefile
        sed -i "/endmenu/i\source \"drivers/kernelsu/Kconfig\"" Kconfig
        ls kernelsu/Makefile && echo "OK: KSU Next"

    - name: Configure kernel
      run: |
        cd $GITHUB_WORKSPACE/kernel
        make O=out raphael_defconfig
        cd out
        # Ensure KSU config is enabled
        sed -i 's/.*CONFIG_KSU.*/CONFIG_KSU=y/' .config 2>/dev/null || \
          echo "CONFIG_KSU=y" >> .config
        grep -q "CONFIG_KSU_MANUAL_HOOK" .config || \
          echo "CONFIG_KSU_MANUAL_HOOK=y" >> .config
        grep -q "CONFIG_OVERLAY_FS" .config || echo "CONFIG_OVERLAY_FS=y" >> .config
        grep -q "CONFIG_KALLSYMS_ALL" .config || \
          echo "CONFIG_KALLSYMS_ALL=y" >> .config
        make olddefconfig
        echo "=== KSU config ==="
        grep -i "ksu\|kallsyms" .config

    - name: Build kernel
      run: |
        cd $GITHUB_WORKSPACE/kernel
        make O=out Image -j$(nproc) \
          LD=ld.lld 2>&1 | tee out/build.log
        echo "===== RESULT ====="
        if [ -f out/arch/arm64/boot/Image ]; then
          echo "BUILD SUCCESS"
          ls -la out/arch/arm64/boot/Image*
        else
          echo "BUILD FAILED"
          echo "--- Errors ---"
          grep -i "error:" out/build.log | tail -30 || true
          echo "--- Last 50 lines ---"
          tail -50 out/build.log
          exit 1
        fi

    - name: Upload build log
      if: always()
      run: |
        [ -f kernel/out/build.log ] && cp kernel/out/build.log build.log

    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: build-log
        path: build.log
        retention-days: 3

    - name: Compress Image
      if: success()
      run: |
        cd $GITHUB_WORKSPACE
        cp kernel/out/arch/arm64/boot/Image Image
        gzip -f -9 Image
        ls -la Image.gz

    - uses: actions/upload-artifact@v4
      if: success()
      with:
        name: SukiSU-Ultra-v4.1.3-Image-raphael
        path: Image.gz
        retention-days: 7
