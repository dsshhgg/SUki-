name: Build SukiSU-Ultra Kernel for Raphael

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
    - name: Install deps
      run: sudo apt-get update -qq && sudo apt-get install -y -qq flex bison bc libssl-dev gcc-aarch64-linux-gnu git curl

    - name: Clone kernel source
      run: |
        git clone --depth=1 --single-branch --branch raphael-p-oss \
          https://github.com/raphael-ubports/kernel_xiaomi_raphael_stock kernel

    - name: Integrate SukiSU-Ultra (non-GKI builtin)
      run: |
        cd $GITHUB_WORKSPACE/kernel
        curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" -o setup.sh
        echo "Using 'builtin' branch for non-GKI kernel"
        bash setup.sh builtin || { echo "setup.sh failed"; exit 1; }
        echo "=== Verify integration ==="
        [ -L drivers/kernelsu ] && echo "KSU symlink: OK" || { echo "symlink MISSING"; exit 1; }
        grep -q "kernelsu" drivers/Makefile && echo "Makefile: OK" || echo "Makefile: MISSING"
        grep -q "kernelsu" drivers/Kconfig && echo "Kconfig: OK" || echo "Kconfig: MISSING"
        echo "=== KSU dirs ==="
        ls -la KernelSU/
        echo "=== Check for manual hooks ==="
        ls KernelSU/kernel/hook/ 2>/dev/null || echo "no hook dir"
        ls KernelSU/kernel/manual/ 2>/dev/null || echo "no manual dir"

    - name: Configure for KSU (non-GKI manual hook)
      run: |
        cd $GITHUB_WORKSPACE/kernel
        export ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu-
        make O=out raphael_user_defconfig
        {
          echo "CONFIG_KSU=y"
          echo "CONFIG_KSU_MANUAL_HOOK=y"
          echo "CONFIG_KALLSYMS=y"
          echo "CONFIG_KALLSYMS_ALL=y"
          echo "CONFIG_KPROBES=y"
        } >> out/.config
        make O=out olddefconfig
        echo "=== KSU config ==="
        grep "CONFIG_KSU" out/.config || echo "KSU not set"
        grep "CONFIG_KALLSYMS" out/.config || echo "KALLSYMS not set"

    - name: Build kernel
      run: |
        cd $GITHUB_WORKSPACE/kernel
        export ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu-
        make O=out -j$(nproc) 2>&1 | tee out/build.log | tail -50
        echo "===== CHECK ====="
        if [ -f out/arch/arm64/boot/Image ]; then
          echo "BUILD SUCCESS: $(ls -la out/arch/arm64/boot/Image*)"
        else
          echo "BUILD FAILED"
          grep -i "error" out/build.log | tail -30 || true
          exit 1
        fi

    - name: Upload Image.gz
      run: |
        cd $GITHUB_WORKSPACE
        cp kernel/out/arch/arm64/boot/Image Image
        gzip -f -9 Image
        ls -la Image.gz

    - uses: actions/upload-artifact@v4
      with:
        name: SukiSU-Ultra-Image-raphael
        path: Image.gz
        retention-days: 7
